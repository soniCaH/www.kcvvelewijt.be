<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footer Design E (v4)</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --green: #4acf52;
  --green-dark: #008755;
  --black: #1E2024;
  --gray-100: #f3f4f6;
  --font-title: 'quasimoda', 'Montserrat', sans-serif;
  --font-body: 'Montserrat', -apple-system, system-ui, sans-serif;
  --font-alt: 'stenciletta', 'Montserrat', sans-serif;
  --max-w: 1440px;
  --diagonal-h: clamp(2rem, 6vw, 5rem);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); background: var(--gray-100); }

.page-content {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 60px 40px 80px;
  text-align: center;
}
.page-content h2 {
  font-family: var(--font-title);
  font-size: 1.5rem;
  font-weight: 700;
  color: #31404b;
  margin-bottom: 8px;
}
.page-content p { font-size: 0.8125rem; color: #9ca3af; }

/* Diagonal */
.diagonal {
  position: relative;
  width: 100%;
  height: var(--diagonal-h);
  margin-bottom: -1px;
}
.diagonal svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ============================================================
   FOOTER
   ============================================================ */

/* ── Green hero zone ── */
.footer__hero-zone {
  background: var(--green-dark);
  overflow: hidden;
}
.footer__hero {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 3rem 2.5rem 2.5rem;
  text-align: right;
}
.footer__hero-name {
  font-family: var(--font-alt);
  font-weight: 900;
  font-size: clamp(3rem, 10vw, 8rem);
  line-height: 0.9;
  letter-spacing: -0.02em;
  color: var(--black);
  text-transform: uppercase;
}

/* ── Black info zone ── */
.footer__info-zone {
  background: var(--black);
  color: #fff;
}

/* ── 3-column grid ── */
.footer__grid {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 2.5rem 2.5rem 2.5rem;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 2rem;
  align-items: start;
}

/* Col 1: Logo only */
.footer__logo-col {
  display: flex;
  align-items: flex-start;
}
.footer__logo-col img {
  height: 104px;
  width: auto;
}

/* Column headings */
.footer__heading {
  font-family: var(--font-title);
  font-size: 0.6875rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: rgba(255, 255, 255, 0.50);
  margin-bottom: 1.125rem;
}

/* Nav links */
.footer__links {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.625rem;
}
.footer__links a {
  font-family: var(--font-body);
  font-size: 0.8125rem;
  color: rgba(255, 255, 255, 0.55);
  text-decoration: none;
  transition: color 0.15s;
}
.footer__links a:hover {
  color: var(--green);
}

/* Contact */
.footer__contact-text {
  font-size: 0.8125rem;
  color: rgba(255, 255, 255, 0.55);
  line-height: 1.6;
  margin-bottom: 1rem;
}
.footer__contact-links {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.footer__contact-links a {
  font-family: var(--font-body);
  font-size: 0.8125rem;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.7);
  text-decoration: none;
  transition: color 0.15s;
}
.footer__contact-links a:hover { color: var(--green); }

/* Social */
.footer__social {
  display: flex;
  gap: 0.625rem;
  margin-top: 1.25rem;
}
.footer__social a {
  color: rgba(255, 255, 255, 0.30);
  transition: color 0.15s;
}
.footer__social a:hover { color: var(--green); }

/* ── Bottom bar ── */
.footer__bottom {
  background: var(--black);
  border-top: 1px solid rgba(255, 255, 255, 0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  padding: 0.875rem 2rem;
  font-size: 0.6875rem;
  color: rgba(255, 255, 255, 0.35);
  letter-spacing: 0.02em;
  flex-wrap: wrap;
}
.footer__bottom a,
.footer__bottom button {
  font-family: var(--font-body);
  font-size: 0.6875rem;
  color: rgba(255, 255, 255, 0.35);
  text-decoration: none;
  background: none;
  border: none;
  cursor: pointer;
  transition: color 0.15s;
}
.footer__bottom a:hover,
.footer__bottom button:hover { color: rgba(255, 255, 255, 0.65); }
.footer__bottom .sep { color: rgba(255, 255, 255, 0.12); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 767px) {
  .footer__hero { padding: 2.5rem 1.5rem 2rem; text-align: center; }
  .footer__brand { padding: 2rem 1.5rem 0; }
  .footer__grid {
    grid-template-columns: 1fr;
    padding: 2rem 1.5rem 2.5rem;
    gap: 2rem;
  }
  .footer__logo-col { justify-content: center; }
  .footer__grid > :nth-child(2),
  .footer__grid > :nth-child(3) { text-align: center; }
  .footer__social { justify-content: center; }
  .footer__bottom {
    flex-direction: column;
    align-items: center;
    gap: 0.375rem;
    padding: 0.875rem 1.5rem;
  }
  .footer__bottom .sep { display: none; }
}

.note-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: #fef08a;
  color: #713f12;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  padding: 6px 16px;
  z-index: 100;
}
</style>
</head>
<body>

<div class="note-bar">
  <strong>Design E v6</strong> — 3 columns: logo (bigger) | links | contact
</div>

<div class="page-content" style="margin-top: 36px;">
  <h2>Sponsors</h2>
  <p>Laatste sectie — gray-100 achtergrond</p>
</div>

<!-- Diagonal: gray-100 → green-dark, direction=left -->
<div class="diagonal" aria-hidden="true">
  <svg viewBox="0 0 100 100" preserveAspectRatio="none">
    <polygon points="0,0 100,0 0,100" fill="#f3f4f6" shape-rendering="crispEdges" />
    <polygon points="100,0 100,100 0,100" fill="#008755" shape-rendering="crispEdges" />
  </svg>
</div>

<!-- ── Green hero zone ── -->
<div class="footer__hero-zone">
  <div class="footer__hero">
    <p class="footer__hero-name">KCVV Elewijt</p>
  </div>
</div>

<!-- ── Black info zone ── -->
<footer class="footer__info-zone">

  <div class="footer__grid">

    <!-- Col 1: Logo -->
    <div class="footer__logo-col">
      <img src="../../apps/web/public/images/logos/kcvv-logo.png" alt="KCVV Elewijt">
    </div>

    <!-- Col 2: Links -->
    <div>
      <p class="footer__heading">Club</p>
      <ul class="footer__links">
        <li><a href="#">Nieuws</a></li>
        <li><a href="#">Kalender</a></li>
        <li><a href="#">Ploegen</a></li>
        <li><a href="#">Sponsors</a></li>
        <li><a href="#">Bestuur</a></li>
      </ul>
    </div>

    <!-- Col 3: Contact -->
    <div>
      <p class="footer__heading">Contact</p>
      <p class="footer__contact-text">
        Driesstraat 32<br>
        1982 Elewijt
      </p>
      <div class="footer__contact-links">
        <a href="mailto:info@kcvvelewijt.be">info@kcvvelewijt.be</a>
      </div>
      <div class="footer__social">
        <a href="#" aria-label="Facebook">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
        </a>
        <a href="#" aria-label="Instagram">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        </a>
      </div>
    </div>

  </div>

  <!-- Bottom bar -->
  <div class="footer__bottom">
    <span>&copy; 2026 KCVV Elewijt</span>
    <span class="sep">&middot;</span>
    <a href="#">Privacyverklaring</a>
    <span class="sep">&middot;</span>
    <button type="button">Cookie-instellingen</button>
  </div>

</footer>

</body>
</html>
