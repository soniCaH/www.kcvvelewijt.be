name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: npx turbo lint --filter=@kcvv/web

      - name: Unused dependencies (knip)
        run: pnpm run knip

      - name: Type check
        run: npx turbo type-check --filter=@kcvv/web

      - name: Run tests
        run: npx turbo test --filter=@kcvv/web -- --coverage

      - name: Type check API
        run: npx turbo type-check --filter=@kcvv/api

      - name: Run API tests
        run: npx turbo test --filter=@kcvv/api

      - name: Lint + type check Studio
        run: npx turbo lint type-check --filter=@kcvv/studio

      - name: Build Studio
        run: npx turbo build --filter=@kcvv/studio

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: apps/web/coverage

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: quality-checks
    environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: npx turbo build --filter=@kcvv/web
        env:
          KCVV_API_URL: ${{ vars.KCVV_API_URL }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}

      - name: Build Storybook
        run: cd apps/web && rm -rf storybook-static && pnpm run build-storybook

      - name: Upload Storybook static
        uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: apps/web/storybook-static
          retention-days: 1
          if-no-files-found: error

  visual-regression-changes:
    name: VR — Detect visual changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      visual: ${{ steps.filter.outputs.visual }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect visual paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            visual:
              - 'apps/web/src/**'
              - 'apps/web/.storybook/**'
              - 'apps/web/public/**'
              - 'apps/web/package.json'

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: [build, visual-regression-changes]
    # Path-filtered on PR (only run when visual paths change), unconditional on
    # push to main/develop so merge-race regressions are caught on the merge
    # commit even if the merging PR didn't itself touch visual paths. The
    # `always()` plus explicit build-success guard is required because
    # visual-regression-changes is itself PR-only — without `always()` GitHub
    # would mark this job skipped on push since one of its `needs` was skipped.
    if: |
      always() &&
      needs.build.result == 'success' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && needs.visual-regression-changes.outputs.visual == 'true')
      )
    # Pinned to match @playwright/test in apps/web/package.json (1.59.1) and the
    # local Docker image in apps/web/Dockerfile.vr. Bump all three together —
    # drift produces silent font-rendering diffs.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 0:0
    env:
      # The container image already ships browsers under /ms-playwright. Suppress
      # @playwright/test's postinstall re-download to save ~150 MB and ~1 min.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Storybook static
        uses: actions/download-artifact@v8
        with:
          name: storybook-static
          path: apps/web/storybook-static

      - name: Run visual regression suite
        run: pnpm --filter @kcvv/web run vr:ci

      - name: Upload diff PNGs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vr-diff-output
          path: |
            apps/web/test/vr/__diff_output__/
            apps/web/test/vr/__received_output__/
          if-no-files-found: ignore
          retention-days: 14

  migration-status:
    name: Update Migration Status
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality-checks, build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate migration report
        working-directory: apps/web
        run: pnpm run migration:status

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deploy-api-staging:
    name: Deploy API staging to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api-contract
        run: npx turbo build --filter=@kcvv/api-contract

      - name: Deploy to Cloudflare Workers (staging)
        run: pnpm --filter @kcvv/api deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-api:
    name: Deploy API to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: [quality-checks, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api-contract
        run: npx turbo build --filter=@kcvv/api-contract

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter @kcvv/api run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-studio:
    name: Deploy Sanity Studio
    runs-on: ubuntu-latest
    needs: [quality-checks, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Sanity Studio
        run: pnpm --filter @kcvv/studio run deploy
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
