name: CI/CD Pipeline

on:
  push:
    branches: [main]
    # Docs-only changes don't affect the API/Studio deploys this workflow runs.
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
    # ready_for_review is included so marking a draft PR ready triggers CI even
    # without a new push (jobs are draft-gated below).
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**.md"
      - "docs/**"

# Cancel superseded runs on the same ref so repeated pushes to a PR branch don't
# each pay for a full pipeline. Main is exempted (cancel-in-progress: false) so
# in-flight deploy jobs on the default branch are never interrupted mid-deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Turbo Remote Cache — when TURBO_TOKEN (repo secret) + TURBO_TEAM (repo
# variable) are set, `turbo` restores unchanged lint/type-check/test/build
# results from a shared remote cache instead of recomputing them every run and
# every Renovate rebase. Unset = turbo runs normally with no remote cache (no
# failure), so this is safe to commit before the credentials exist. Setup steps
# are in the PR description.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # Quality checks + build merged into one job: `build` previously did its own
  # checkout + install and ran only after this job, so merging removes a whole
  # redundant install cycle per run. Steps fail-fast, so a lint/type/test
  # failure still stops before the (later) build steps — same early-exit as the
  # old two-job split. Draft PRs are skipped to avoid CI on work-in-progress.
  quality-checks:
    name: Quality Checks + Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: npx turbo lint --filter=@kcvv/web

      - name: Unused dependencies (knip)
        run: pnpm run knip

      - name: Type check
        run: npx turbo type-check --filter=@kcvv/web

      - name: Run tests
        run: npx turbo test --filter=@kcvv/web -- --coverage

      - name: Type check API
        run: npx turbo type-check --filter=@kcvv/api

      - name: Run API tests
        run: npx turbo test --filter=@kcvv/api

      - name: Lint + type check Studio
        run: npx turbo lint type-check --filter=@kcvv/studio

      - name: Build Studio
        run: npx turbo build --filter=@kcvv/studio

      # Folded in from the former standalone `security-scan` job — it reuses this
      # job's already-installed dependencies instead of paying for its own
      # checkout + install. Non-blocking (advisory only). Deeper dependency
      # vulnerability scanning is handled by the Snyk GitHub App (the
      # `security/snyk` PR check), which runs on Snyk's infrastructure with no
      # GitHub Actions minutes.
      - name: Audit dependencies (pnpm)
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: apps/web/coverage

      - name: Build Next.js
        run: npx turbo build --filter=@kcvv/web
        env:
          KCVV_API_URL: ${{ vars.KCVV_API_URL }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}

      # REDESIGN-DISABLED: the Storybook build + artifact upload only exist to
      # feed the `visual-regression` job, paused during the redesign to save the
      # bulk of the ~14-15 min/push VR cost. Re-enable the whole VR chain by
      # setting repository variable RUN_VISUAL_REGRESSION=true (Settings →
      # Secrets and variables → Actions → Variables) — no YAML edit needed.
      - name: Build Storybook
        if: ${{ vars.RUN_VISUAL_REGRESSION == 'true' }}
        run: cd apps/web && rm -rf storybook-static && pnpm run build-storybook

      - name: Upload Storybook static
        if: ${{ vars.RUN_VISUAL_REGRESSION == 'true' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: storybook-static
          path: apps/web/storybook-static
          retention-days: 1
          if-no-files-found: error

  visual-regression-changes:
    name: VR — Detect visual changes
    runs-on: ubuntu-latest
    # REDESIGN-DISABLED: gated off via the RUN_VISUAL_REGRESSION repo variable.
    if: ${{ vars.RUN_VISUAL_REGRESSION == 'true' && github.event_name == 'pull_request' }}
    outputs:
      visual: ${{ steps.filter.outputs.visual }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Detect visual paths
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            visual:
              - 'apps/web/src/**'
              - 'apps/web/.storybook/**'
              - 'apps/web/public/**'
              - 'apps/web/package.json'

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality-checks, visual-regression-changes]
    # REDESIGN-DISABLED: gated off via the RUN_VISUAL_REGRESSION repo variable —
    # set it to 'true' to re-enable the whole VR chain (this job, the
    # visual-regression-changes job, and the Storybook build steps) at once.
    #
    # When enabled, the trailing condition is the original: path-filtered on PR
    # (only run when visual paths change), unconditional on push to main so
    # merge-race regressions are caught on the merge commit even if the merging
    # PR didn't itself touch visual paths. `always()` is required because
    # visual-regression-changes is PR-only — without it GitHub would mark this
    # job skipped on push since one of its `needs` was skipped.
    if: |
      vars.RUN_VISUAL_REGRESSION == 'true' &&
      always() &&
      needs.quality-checks.result == 'success' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && needs.visual-regression-changes.outputs.visual == 'true')
      )
    # Pinned to match @playwright/test in apps/web/package.json (1.60.0) and the
    # local Docker image in apps/web/Dockerfile.vr. Bump all three together —
    # drift produces silent font-rendering diffs.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --user 0:0
    env:
      # The container image already ships browsers under /ms-playwright. Suppress
      # @playwright/test's postinstall re-download to save ~150 MB and ~1 min.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Storybook static
        uses: actions/download-artifact@v8.0.1
        with:
          name: storybook-static
          path: apps/web/storybook-static

      - name: Run visual regression suite
        run: pnpm --filter @kcvv/web run vr:ci

      - name: Upload diff PNGs on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: vr-diff-output
          path: |
            apps/web/test/vr/__diff_output__/
            apps/web/test/vr/__snapshots__/__received_output__/
          if-no-files-found: ignore
          retention-days: 14

  vr-diff-comment:
    name: VR — Post diff comment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [visual-regression]
    if: failure() && needs.visual-regression.result == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          token: ${{ secrets.KCVV_VR_BOT_TOKEN }}
          fetch-depth: 0

      - name: Download diff artifacts
        uses: actions/download-artifact@v8.0.1
        continue-on-error: true
        with:
          name: vr-diff-output
          path: /tmp/vr-diff-output

      - name: Push diffs to orphan branch
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.KCVV_VR_BOT_TOKEN }}
        run: |
          BRANCH="vr-diffs/pr-${PR_NUMBER}"

          # Abort gracefully if no diff PNGs were produced (artifact absent or empty)
          shopt -s nullglob
          diff_pngs=(/tmp/vr-diff-output/__diff_output__/*.png /tmp/vr-diff-output/__snapshots__/__received_output__/*.png)
          if [ ${#diff_pngs[@]} -eq 0 ]; then
            echo "No diff PNGs found — skipping orphan branch push. Original VR failure remains visible."
            exit 0
          fi

          git config user.email "kcvv-vr-bot@users.noreply.github.com"
          git config user.name "kcvv-vr-bot"

          # Create a detached orphan branch with no history
          git checkout --orphan "$BRANCH"
          git rm -rf . --quiet

          # Copy diff PNGs with prefixes to avoid filename collisions
          mkdir -p vr-diffs
          for f in /tmp/vr-diff-output/__diff_output__/*.png; do
            [ -f "$f" ] && cp "$f" "vr-diffs/diff-$(basename "$f")"
          done
          for f in /tmp/vr-diff-output/__snapshots__/__received_output__/*.png; do
            [ -f "$f" ] && cp "$f" "vr-diffs/actual-$(basename "$f")"
          done

          git add vr-diffs/
          git commit -m "vr: diff snapshots for PR #${PR_NUMBER} [skip ci]"
          git push "https://x-access-token:${TOKEN}@github.com/${REPO}.git" \
            "HEAD:refs/heads/${BRANCH}" --force

      - name: Build comment body
        id: build-comment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BRANCH="vr-diffs/pr-${PR_NUMBER}"
          COMMENT="## Visual Regression Diffs\n\n"
          COMMENT+="One or more stories changed. Review before triggering \`@kcvv-bot update-vr-baselines\`.\n\n"

          HAS_DIFFS=false
          shopt -s nullglob
          for diff_file in /tmp/vr-diff-output/__diff_output__/*.png; do
            filename=$(basename "$diff_file")
            story_name="${filename%.png}"
            BASE_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/vr-diffs"

            COMMENT+="### ${story_name}\n\n"
            COMMENT+="| Actual | Diff |\n"
            COMMENT+="|--------|------|\n"
            COMMENT+="| ![actual](${BASE_URL}/actual-${filename}) | ![diff](${BASE_URL}/diff-${filename}) |\n\n"
            HAS_DIFFS=true
          done

          echo "has_diffs=${HAS_DIFFS}" >> "$GITHUB_OUTPUT"
          if [ "$HAS_DIFFS" = "true" ]; then
            # Write to file to avoid shell escaping issues
            printf "%b" "$COMMENT" > /tmp/vr-comment.md
            echo "comment_file=/tmp/vr-comment.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Post sticky PR comment
        if: steps.build-comment.outputs.has_diffs == 'true'
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: vr-diff-comment
          path: ${{ steps.build-comment.outputs.comment_file }}
          GITHUB_TOKEN: ${{ secrets.KCVV_VR_BOT_TOKEN }}

  deploy-api-staging:
    name: Deploy API staging to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality-checks
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api-contract
        run: npx turbo build --filter=@kcvv/api-contract

      - name: Deploy to Cloudflare Workers (staging)
        run: pnpm --filter @kcvv/api deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Combined deploy: API (Cloudflare Workers) + Sanity Studio run as sequential
  # steps in one job instead of two parallel jobs, sharing a single checkout +
  # install. Trade-off: a failed API deploy aborts the job before Studio deploys
  # (previously independent). Acceptable on the main-only deploy path; re-split
  # if independent failure isolation is needed.
  deploy:
    name: Deploy API + Studio
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api-contract
        run: npx turbo build --filter=@kcvv/api-contract

      - name: Deploy API to Cloudflare Workers
        run: pnpm --filter @kcvv/api run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Sanity Studio
        run: pnpm --filter @kcvv/studio run deploy
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
