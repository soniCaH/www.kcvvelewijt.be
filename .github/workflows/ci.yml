name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: npx turbo lint --filter=@kcvv/web

      - name: Unused dependencies (knip)
        run: pnpm run knip

      - name: Type check
        run: npx turbo type-check --filter=@kcvv/web

      - name: Run tests
        run: npx turbo test --filter=@kcvv/web -- --coverage

      - name: Type check API
        run: npx turbo type-check --filter=@kcvv/api

      - name: Run API tests
        run: npx turbo test --filter=@kcvv/api

      - name: Lint + type check Studio
        run: npx turbo lint type-check --filter=@kcvv/studio

      - name: Build Studio
        run: npx turbo build --filter=@kcvv/studio

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: apps/web/coverage

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: quality-checks
    environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: npx turbo build --filter=@kcvv/web
        env:
          KCVV_API_URL: ${{ vars.KCVV_API_URL }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}

      - name: Build Storybook
        run: cd apps/web && rm -rf storybook-static && pnpm run build-storybook

      - name: Upload Storybook static
        uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: apps/web/storybook-static
          retention-days: 1
          if-no-files-found: error

  visual-regression-changes:
    name: VR — Detect visual changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      visual: ${{ steps.filter.outputs.visual }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect visual paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            visual:
              - 'apps/web/src/**'
              - 'apps/web/.storybook/**'
              - 'apps/web/public/**'
              - 'apps/web/package.json'

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: [build, visual-regression-changes]
    # Path-filtered on PR (only run when visual paths change), unconditional on
    # push to main/develop so merge-race regressions are caught on the merge
    # commit even if the merging PR didn't itself touch visual paths. The
    # `always()` plus explicit build-success guard is required because
    # visual-regression-changes is itself PR-only — without `always()` GitHub
    # would mark this job skipped on push since one of its `needs` was skipped.
    if: |
      always() &&
      needs.build.result == 'success' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && needs.visual-regression-changes.outputs.visual == 'true')
      )
    # Pinned to match @playwright/test in apps/web/package.json (1.59.1) and the
    # local Docker image in apps/web/Dockerfile.vr. Bump all three together —
    # drift produces silent font-rendering diffs.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 0:0
    env:
      # The container image already ships browsers under /ms-playwright. Suppress
      # @playwright/test's postinstall re-download to save ~150 MB and ~1 min.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Storybook static
        uses: actions/download-artifact@v8
        with:
          name: storybook-static
          path: apps/web/storybook-static

      - name: Run visual regression suite
        run: pnpm --filter @kcvv/web run vr:ci

      - name: Upload diff PNGs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vr-diff-output
          path: |
            apps/web/test/vr/__diff_output__/
            apps/web/test/vr/__received_output__/
          if-no-files-found: ignore
          retention-days: 14

  vr-diff-comment:
    name: VR — Post diff comment
    runs-on: ubuntu-latest
    needs: [visual-regression]
    if: failure() && needs.visual-regression.result == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.KCVV_VR_BOT_TOKEN }}
          fetch-depth: 0

      - name: Download diff artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: vr-diff-output
          path: /tmp/vr-diff-output

      - name: Push diffs to orphan branch
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.KCVV_VR_BOT_TOKEN }}
        run: |
          BRANCH="vr-diffs/pr-${PR_NUMBER}"

          # Abort gracefully if no diff PNGs were produced (artifact absent or empty)
          shopt -s nullglob
          diff_pngs=(/tmp/vr-diff-output/__diff_output__/*.png /tmp/vr-diff-output/__received_output__/*.png)
          if [ ${#diff_pngs[@]} -eq 0 ]; then
            echo "No diff PNGs found — skipping orphan branch push. Original VR failure remains visible."
            exit 0
          fi

          git config user.email "kcvv-vr-bot@users.noreply.github.com"
          git config user.name "kcvv-vr-bot"

          # Create a detached orphan branch with no history
          git checkout --orphan "$BRANCH"
          git rm -rf . --quiet

          # Copy diff PNGs with prefixes to avoid filename collisions
          mkdir -p vr-diffs
          for f in /tmp/vr-diff-output/__diff_output__/*.png; do
            [ -f "$f" ] && cp "$f" "vr-diffs/diff-$(basename "$f")"
          done
          for f in /tmp/vr-diff-output/__received_output__/*.png; do
            [ -f "$f" ] && cp "$f" "vr-diffs/actual-$(basename "$f")"
          done

          git add vr-diffs/
          git commit -m "vr: diff snapshots for PR #${PR_NUMBER} [skip ci]"
          git push "https://x-access-token:${TOKEN}@github.com/${REPO}.git" \
            "HEAD:refs/heads/${BRANCH}" --force

      - name: Build comment body
        id: build-comment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BRANCH="vr-diffs/pr-${PR_NUMBER}"
          COMMENT="## Visual Regression Diffs\n\n"
          COMMENT+="One or more stories changed. Review before triggering \`@kcvv-bot update-vr-baselines\`.\n\n"

          for diff_file in /tmp/vr-diff-output/__diff_output__/*.png; do
            [ -f "$diff_file" ] || continue
            filename=$(basename "$diff_file")
            story_name="${filename%.png}"
            BASE_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/vr-diffs"

            COMMENT+="### ${story_name}\n\n"
            COMMENT+="| Actual | Diff |\n"
            COMMENT+="|--------|------|\n"
            COMMENT+="| ![actual](${BASE_URL}/actual-${filename}) | ![diff](${BASE_URL}/diff-${filename}) |\n\n"
          done

          # Write to file to avoid shell escaping issues
          printf "%b" "$COMMENT" > /tmp/vr-comment.md
          echo "comment_file=/tmp/vr-comment.md" >> "$GITHUB_OUTPUT"

      - name: Post sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vr-diff-comment
          path: ${{ steps.build-comment.outputs.comment_file }}
          GITHUB_TOKEN: ${{ secrets.KCVV_VR_BOT_TOKEN }}

  migration-status:
    name: Update Migration Status
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality-checks, build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate migration report
        working-directory: apps/web
        run: pnpm run migration:status

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deploy-api-staging:
    name: Deploy API staging to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api-contract
        run: npx turbo build --filter=@kcvv/api-contract

      - name: Deploy to Cloudflare Workers (staging)
        run: pnpm --filter @kcvv/api deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-api:
    name: Deploy API to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: [quality-checks, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build api-contract
        run: npx turbo build --filter=@kcvv/api-contract

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter @kcvv/api run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-studio:
    name: Deploy Sanity Studio
    runs-on: ubuntu-latest
    needs: [quality-checks, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Sanity Studio
        run: pnpm --filter @kcvv/studio run deploy
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
